<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            padding: 20px;
            margin: 0;
        }

        .dashboard-container {
            width: 95%;
            margin: auto;
        }
    </style>
</head>

<body>

    <h1>Crime Analytics Dashboard</h1>

    <div class="dashboard-container">
        <div class='tableauPlaceholder' id='viz1775809980742' style='position: relative'>

            <noscript>
                <a href='#'>
                    <img alt='Dashboard'
                        src='https://public.tableau.com/static/images/Ta/Tableauminiproject_17758099478640/Dashboard2/1_rss.png'
                        style='border: none' />
                </a>
            </noscript>

            <object class='tableauViz' style='display:none;'>
                <param name='host_url' value='https://public.tableau.com/' />
                <param name='embed_code_version' value='3' />
                <param name='site_root' value='' />
                <param name='name' value='Tableauminiproject_17758099478640/Dashboard2' />
                <param name='tabs' value='no' />
                <param name='toolbar' value='yes' />
                <param name='static_image'
                    value='https://public.tableau.com/static/images/Ta/Tableauminiproject_17758099478640/Dashboard2/1.png' />
                <param name='animate_transition' value='yes' />
                <param name='display_static_image' value='yes' />
                <param name='display_spinner' value='yes' />
                <param name='display_overlay' value='yes' />
                <param name='display_count' value='yes' />
                <param name='language' value='en-US' />
            </object>
        </div>
    </div>

    <script type='text/javascript'>
        var divElement = document.getElementById('viz1775809980742');
        var vizElement = divElement.getElementsByTagName('object')[0];

        function resizeViz() {
            if (divElement.offsetWidth > 800) {
                vizElement.style.width = '100%';
                vizElement.style.height = (divElement.offsetWidth * 0.75) + 'px';
            } else if (divElement.offsetWidth > 500) {
                vizElement.style.width = '100%';
                vizElement.style.height = (divElement.offsetWidth * 0.75) + 'px';
            } else {
                vizElement.style.width = '100%';
                vizElement.style.height = '1200px';
            }
        }

        resizeViz();
        window.addEventListener("resize", resizeViz);

        var scriptElement = document.createElement('script');
        scriptElement.src = 'https://public.tableau.com/javascripts/api/viz_v1.js';
        vizElement.parentNode.insertBefore(scriptElement, vizElement);
    </script>

</body>
</html>
